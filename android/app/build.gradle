plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {

    // ----- BEGIN flavorDimensions (autogenerated by flutter_flavorizr) -----
    flavorDimensions += "environment"

    productFlavors {
        dev {
            dimension "environment"
            applicationId "com.example.firebase_auth_app.dev"
            resValue "string", "app_name", "Firebase Auth Dev"
        }
        stg {
            dimension "environment"
            applicationId "com.example.firebase_auth_app.stg"
            resValue "string", "app_name", "Firebase Auth Stg"
        }
        prod {
            dimension "environment"
            applicationId "com.example.firebase_auth_app"
            resValue "string", "app_name", "Firebase Auth"
        }
    }

    // ----- END flavorDimensions (autogenerated by flutter_flavorizr) -----
    namespace "com.example.firebase_auth_app"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    flavorDimensions "environment"
    productFlavors {
        dev {
            dimension "environment"
            applicationId "com.example.firebase_auth_app.dev"
            resValue "string", "app_name", "Firebase Auth Dev"
        }
        stg {
            dimension "environment"
            applicationId "com.example.firebase_auth_app.stg"
            resValue "string", "app_name", "Firebase Auth Stg"
        }
        prod {
            dimension "environment"
            applicationId "com.example.firebase_auth_app"
            resValue "string", "app_name", "Firebase Auth"
        }
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.firebase_auth_app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
